services:
  db:
    image: postgres:16-alpine
    container_name: sellaplus_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sellaplus
      POSTGRES_USER: sellaplus
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sellaplus_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sellaplus"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sellaplus_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sellaplus:${DB_PASSWORD:-sellaplus_secret}@db:5432/sellaplus
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_jwt_secret}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret}
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 4300
      NODE_ENV: production
    ports:
      - "4300:4300"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sellaplus_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4300
    ports:
      - "4200:4200"

volumes:
  postgres_data:
